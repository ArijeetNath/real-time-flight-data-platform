services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: flight
      POSTGRES_PASSWORD: flight
      POSTGRES_DB: flight
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flight"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingest:
    build: .
    command: python -m pipeline.run loop
    environment:
      DATABASE_URL: postgresql://flight:flight@postgres:5432/flight
      INGEST_INTERVAL: "300"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      DATABASE_URL: postgresql://flight:flight@postgres:5432/flight
    ports: ["8501:8501"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
